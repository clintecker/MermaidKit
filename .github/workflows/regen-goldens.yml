name: Regenerate goldens

# LinuxGoldenTests' reference images are rasterized by FreeType/Cairo, whose
# exact anti-aliasing depends on the CPU/library environment — so the goldens
# MUST be produced by the same environment that verifies them (the Linux CI
# runner), not a maintainer's laptop. This manual workflow regenerates them on
# that runner and commits them back, so the `swift test (Linux)` job's
# comparison is against CI-native references. Run it (Actions ▸ "Regenerate
# goldens" ▸ Run workflow) after any intentional change to how a fixture renders.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    # Same digest-pinned image as the verifying job (see ci.yml).
    container: swift@sha256:dd349c6dfc3cd3040910a84ab3e5bd5d08efdd547e5fb9f77b765abed16fe5ff
    steps:
      - uses: actions/checkout@v4
      - name: Install Cairo/FontConfig
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            libcairo2-dev libfontconfig1-dev pkg-config fonts-dejavu-core fontconfig git
          fc-cache -f
      - name: Regenerate reference images
        env:
          SWIFT_DETERMINISTIC_HASHING: "1"
        run: UPDATE_GOLDENS=1 swift test --traits LinuxRaster --filter LinuxGoldenTests
      - name: Commit if changed
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Tests/MermaidRenderTests/__golden__
          if git diff --cached --quiet; then
            echo "goldens unchanged"
          else
            git commit -m "Regenerate golden reference images (CI arm64)"
            git push
          fi
